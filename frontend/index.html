<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Primary SEO -->
    <title>StudyAssistant — AI study buddy that turns notes into answers & quizzes</title>
    <meta
      name="description"
      content="StudyAssistant is an AI study buddy (meet Aeva). Ask any question, upload your PDFs and notes for instant answers, search the web, and auto-generate practice quizzes. Free to start."
    />
    <meta name="keywords" content="AI study assistant, study buddy, quiz generator, PDF question answering, exam prep, AI tutor, flashcards, practice quiz" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://studyassistant.app/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#7c3aed" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Optional learning-content fonts (Appearance settings). Inter/Sora are
         self-hosted; these are only the extra families users can pick from, so
         they load non-render-blocking to protect landing-page LCP/FCP. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StudyAssistant" />
    <meta property="og:title" content="StudyAssistant — AI Study Buddy" />
    <meta
      property="og:description"
      content="Ask anything, upload your notes, and generate practice quizzes with Aeva, your AI study buddy."
    />
    <meta property="og:url" content="https://studyassistant.app/" />
    <meta property="og:image" content="https://studyassistant.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StudyAssistant — AI Study Buddy" />
    <meta
      name="twitter:description"
      content="Ask anything, upload your notes, and generate practice quizzes with Aeva, your AI study buddy."
    />
    <meta name="twitter:image" content="https://studyassistant.app/og-image.svg" />

    <!-- PWA / mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aeva" />

    <!-- Structured data (Organization / WebSite / SoftwareApplication / FAQ)
         is injected per-route by the app's <Seo> component so it stays in sync
         with each page. -->
  </head>

  <body>
    <!-- Branded first-paint splash. Lives inside #root so React replaces it
         automatically on mount — no blank/white flash before the app loads. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0b0b13;
        z-index: 9999;
      }
      #app-splash .mark {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #7c3aed, #4f46e5, #06b6d4);
        box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.6);
        display: grid;
        place-items: center;
        animation: appSplashPulse 1.6s ease-in-out infinite;
      }
      @keyframes appSplashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .mark { animation: none; }
      }
    </style>
    <div id="root">
      <div id="app-splash">
        <div class="mark" aria-label="Loading Aeva">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
            stroke="#fff" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3z" />
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
