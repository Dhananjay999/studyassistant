<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="StudyAssistant — a complete AI learning system">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b13" />
      <stop offset="1" stop-color="#15102b" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="0.5" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#14b8a6" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55" />
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="980" cy="120" r="360" fill="url(#glow)" />
  <circle cx="140" cy="560" r="300" fill="url(#glow)" opacity="0.7" />

  <!-- Brand mark -->
  <g transform="translate(90 90)">
    <rect width="96" height="96" rx="26" fill="url(#brand)" />
    <path d="M48 22c1.7 11.4 8.1 17.8 19.5 19.5C56.1 43.2 49.7 49.6 48 61c-1.7-11.4-8.1-17.8-19.5-19.5C39.9 39.8 46.3 33.4 48 22z" fill="#fff" />
    <circle cx="69" cy="30" r="4.5" fill="#fff" opacity="0.9" />
  </g>
  <text x="206" y="152" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="40" font-weight="700" fill="#ffffff">StudyAssistant</text>

  <!-- Headline -->
  <text x="90" y="320" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="76" font-weight="800" fill="#ffffff">A complete AI</text>
  <text x="90" y="410" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="76" font-weight="800" fill="url(#brand)">learning system</text>

  <!-- Subhead -->
  <text x="92" y="480" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="32" font-weight="500" fill="#b9b6c9">Chat with your PDFs · Quizzes · Flashcards · Analytics</text>

  <!-- Feature pills -->
  <g font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="24" font-weight="600" fill="#e7e5f0">
    <rect x="90" y="524" width="200" height="56" rx="28" fill="#ffffff" opacity="0.08" />
    <text x="120" y="561">AI Study Buddy</text>
    <rect x="308" y="524" width="176" height="56" rx="28" fill="#ffffff" opacity="0.08" />
    <text x="338" y="561">Free to start</text>
  </g>
</svg>
